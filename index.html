/* ─── ヘルパー ─── */
const srcColor = s => ({ LINE:C.green, Hotpepper:"#e05c5c", "電話":"#5b9dee", "優先":C.purple, "要予約":C.orange, "事前予約":C.cyan }[s] || C.muted);

const routeColors = {

function getToday() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function getTomorrow() { const d=new Date(); d.setDate(d.getDate()+1); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function getTodayLabel() { const d=new Date(); return `${d.getMonth()+1}月${d.getDate()}日（${DAYS_JP[d.getDay()]}）`; }
function getTodayShort() { const d=new Date(); return `${d.getMonth()+1}/${d.getDate()} ${DAYS_JP[d.getDay()]}`; }
function getWeekRange() {
  const now=new Date(), day=now.getDay();
  const mon=new Date(now); mon.setDate(now.getDate()-(day===0?6:day-1));
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  const f=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  return [f(mon),f(sun)];
}
function getMonthRange() {
  const now=new Date();
  const first=new Date(now.getFullYear(),now.getMonth(),1);
  const last=new Date(now.getFullYear(),now.getMonth()+1,0);
  const f=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  return [f(first),f(last)];
}
function getSalonBoardUrl(r) {
  const dateParam=r.date.replace(/-/g,"");
  const timeParam=r.time.replace(":","");
  const now=new Date().toISOString().replace(/[-T:.Z]/g,"").slice(0,14);
  return `https://salonboard.com/CLP/bt/reserve/ext/extReserveRegist/?date=${dateParam}&time=${timeParam}&stylistId=${STYLIST_ID}&rlastupdate=${now}`;
}
function formatPhone(phone) { return phone ? phone.replace(/[-\s]/g,"") : ""; }

/* ─── 経路別バー ─── */
const RouteBar = ({label, count, total, color}) => {

  return (

      <div style={{ background:"#1a1a1a", borderRadius:6, height:8, overflow:"hidden" }}>

};

const RouteSection = ({title, route, total}) => (

      .sort((a,b) => b[1] - a[1])
      .map(([key, val]) => (

      ))

/* ─── データ取得フック ─── */
function useReservations(apiUrl) {
  const [data,setData]=useState(MOCK);
  const [homeStats,setHomeStats]=useState(null);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const [lastFetched,setLastFetched]=useState(null);
  const isReal=apiUrl && !apiUrl.includes("YOUR_DEPLOYMENT_ID");

  const fetchReservations=useCallback(async()=>{
    if(!isReal){setData(MOCK);setError(null);return;}
    setLoading(true);setError(null);
    try{
      const r=await fetch(apiUrl+"?action=getReservations");
      if(!r.ok)throw new Error("HTTP "+r.status);
      const j=await r.json();
      if(j.reservations)setData(j.reservations);
      setLastFetched(new Date());
    }catch(e){setError(e.message);setData(MOCK);}
    finally{setLoading(false);}
  },[apiUrl,isReal]);

  const fetchHomeStats=useCallback(async()=>{
    if(!isReal){setHomeStats(null);return;}
    try{
      const r=await fetch(apiUrl+"?action=getHomeStats");
      if(!r.ok)throw new Error("HTTP "+r.status);
      const j=await r.json();
      setHomeStats(j);
    }catch(e){console.error("getHomeStats:",e);setHomeStats(null);}
  },[apiUrl,isReal]);

  const refetch=useCallback(()=>{fetchReservations();fetchHomeStats();},[fetchReservations,fetchHomeStats]);
  useEffect(()=>{refetch();},[refetch]);
  const updateLocal=(id,changes)=>{setData(prev=>prev.map(r=>r.id===id?{...r,...changes}:r));};
  return {data,homeStats,loading,error,refetch,isReal,lastFetched,updateLocal};
}

/* ─── SalonBoardボトムシート ─── */
function SalonBoardSheet({reservation:r,onClose,converting}) {
  const [phoneCopied,setPhoneCopied]=useState(false);
  if(!r)return null;

  const copyPhone=async()=>{
    const num=formatPhone(r.phone);
    if(!num)return;
    try{ await navigator.clipboard.writeText(num); }
    catch(e){
      const ta=document.createElement("textarea");
      ta.value=num;ta.style.position="fixed";ta.style.opacity="0";
      document.body.appendChild(ta);ta.select();document.execCommand("copy");
      document.body.removeChild(ta);
    }
    setPhoneCopied(true);
    setTimeout(()=>setPhoneCopied(false),2000);
  };

  return (
    <div style={{ position:"fixed", inset:0, zIndex:1000, display:"flex", alignItems:"flex-end", justifyContent:"center" }}>
      <div onClick={()=>onClose(true)} style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.8)" }} />
      <div style={{
        position:"relative", width:"100%", maxWidth:480,
        background:C.card, borderRadius:"24px 24px 0 0",
        padding:"28px", boxShadow:"0 -4px 40px rgba(0,0,0,0.5)",
        borderTop:`3px solid ${C.accentBorder}`,
        animation:"sheetUp 0.3s ease-out"
      }}>
        <h3 style={{ color:C.text, fontSize:22, fontWeight:800, marginBottom:20 }}>SalonBoard連携</h3>

        {/* 予約情報 */}
        <div style={{
          background:C.surface, padding:18, borderRadius:12,
          marginBottom:20, border:`2px solid ${C.border}`
        }}>
          {[["顧客名",r.name],["日時",r.date.slice(5).replace("-","/")+" "+r.time],["メニュー",r.menu],["電話",r.phone||"—"]].map(([k,v])=>(
            <p key={k} style={{ margin:"10px 0", fontSize:16, color:C.sub, lineHeight:1.6 }}>
              <strong style={{ color:C.text }}>{k}：</strong>{v}
            </p>
          ))}
        </div>

        {/* アクションボタン群 */}
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          <button onClick={copyPhone} style={{
            background:phoneCopied?C.accentBg:C.blue, color:"#fff", padding:18,
            border:`2px solid ${phoneCopied?C.accentBorder:"#2d7a90"}`,
            borderRadius:12, fontSize:17, fontWeight:700, cursor:"pointer",
            minHeight:60, textAlign:"center", lineHeight:1.5
          }}>
            {phoneCopied ? "✅ コピーしました" : <>📋 電話番号コピー<br/><span style={{ fontFamily:"'JetBrains Mono',monospace" }}>{formatPhone(r.phone)}</span></>}
          </button>

          <a href={getSalonBoardUrl(r)} target="_blank" rel="noopener noreferrer" style={{
            display:"flex", alignItems:"center", justifyContent:"center",
            background:C.accentBg, color:"#fff", padding:18,
            border:`2px solid ${C.accentBorder}`,
            borderRadius:12, fontSize:17, fontWeight:700,
            textDecoration:"none", minHeight:60
          }}>📝 SalonBoardに書き込む</a>

          <button onClick={()=>onClose(true)} style={{
            background:"#3a3a3a", color:C.sub, padding:18,
            border:"2px solid #4a4a4a",
            borderRadius:12, fontSize:17, fontWeight:700, cursor:"pointer", minHeight:60
          }}>閉じる（U変換ボタン有効化）</button>
        </div>
      </div>
    </div>
  );
}

/* ─── ホーム画面 ─── */
function Dashboard({reservations,homeStats,loading,error,refetch,isReal,lastFetched}) {
  const today=getToday(), tomorrow=getTomorrow();
  const [weekStart,weekEnd]=getWeekRange();
  const [monthStart,monthEnd]=getMonthRange();

  const todayCount  = homeStats?.todayCount  ?? reservations.filter(r=>r.date===today).length;
  const weekCount   = homeStats?.weekCount   ?? reservations.filter(r=>r.date>=weekStart&&r.date<=weekEnd).length;
  const monthCount  = homeStats?.monthCount  ?? reservations.filter(r=>r.date>=monthStart&&r.date<=monthEnd).length;
  const pendingCount= homeStats?.pendingCount?? reservations.filter(r=>r.status==="pending"||r.prefix==="【要予約】").length;
  const remindNeed  = homeStats?.remindNeedCount ?? reservations.filter(r=>r.date===tomorrow&&r.prefix==="【U】").length;

  const todays=reservations.filter(r=>r.date===today).sort((a,b)=>a.time.localeCompare(b.time));

  // 経路データ
  const monthRoute = homeStats?.monthRoute || null;
  const yearRoute = homeStats?.yearRoute || null;
  const monthRouteTotal = monthRoute ? Object.values(monthRoute).reduce((a,b)=>a+b, 0) : 0;
  const yearRouteTotal = yearRoute ? Object.values(yearRoute).reduce((a,b)=>a+b, 0) : 0;

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
        <h2 style={{ color:C.text, fontSize:20, fontWeight:800 }}>{getTodayLabel()}</h2>
        <button onClick={refetch} disabled={loading} style={{
          background:C.card, border:`2px solid ${C.border}`, color:loading?C.muted:C.accent,
          borderRadius:10, padding:"8px 16px", fontSize:14, cursor:"pointer", fontWeight:600
        }}>{loading?"読込中…":"↻ 更新"}</button>
      </div>

      <div style={{
        background:isReal?C.accentBg+"44":"#8b3a3a33",
        border:`2px solid ${isReal?C.accentBorder:"#8b3a3a"}`,
        borderRadius:10, padding:"10px 14px", marginBottom:16,
        fontSize:14, color:isReal?C.accent:C.orange, fontWeight:600
      }}>
        {isReal ? "✓ GAS API接続中"+(lastFetched?" — "+lastFetched.toLocaleTimeString("ja-JP"):"") : "⚠ モックデータ表示中"}
        {error && <div style={{ color:"#e05c5c", marginTop:4, fontSize:13 }}>エラー: {error}</div>}
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:16 }}>
        <StatCard label="今日" value={todayCount} unit="件" color={C.accent} icon="📅" />
        <StatCard label="今週" value={weekCount} unit="件" color={C.blueBright} icon="📊" />
        <StatCard label="今月" value={monthCount} unit="件" color={C.cyan} icon="📈" />
        <StatCard label="要確認" value={pendingCount} unit="件" color={C.orange} icon="⚠️" />
      </div>

      {remindNeed>0 && (
        <div style={{ background:"#4a2d6e33", border:"2px solid #4a2d6e", borderRadius:12, padding:"14px 16px", marginBottom:16, display:"flex", alignItems:"center", gap:10 }}>
          <span style={{ fontSize:18 }}>🔔</span>
          <div>
            <div style={{ color:C.purple, fontSize:15, fontWeight:700 }}>リマインド必要：{remindNeed}件</div>
            <div style={{ color:C.muted, fontSize:13 }}>明日の【U】予約で未送信</div>
          </div>
        </div>
      )}

      {reservations.filter(r=>r.prefix==="【要予約】").length>0 && (
        <div style={{ background:"#8b3a3a33", border:"2px solid #8b3a3a", borderRadius:12, padding:"14px 16px", marginBottom:16, display:"flex", alignItems:"center", gap:10 }}>
          <span style={{ fontSize:18 }}>📝</span>
          <div style={{ flex:1 }}>
            <div style={{ color:C.orange, fontSize:15, fontWeight:700 }}>SB未書き込み：{reservations.filter(r=>r.prefix==="【要予約】").length}件</div>
            <div style={{ color:C.muted, fontSize:13 }}>予約タブで対応 →</div>
          </div>
        </div>
      )}

      {/* ─── 経路別パーセンテージ ─── */}
      {monthRoute && monthRouteTotal > 0 && (
        <RouteSection title="📈 今月の予約経路" route={monthRoute} total={monthRouteTotal} />
      )}
      {yearRoute && yearRouteTotal > 0 && (
        <RouteSection title="📊 今年の予約経路" route={yearRoute} total={yearRouteTotal} />
      )}

      <Card>
        <div style={{ color:C.sub, fontSize:14, fontWeight:600, marginBottom:14 }}>🕐 本日のタイムライン</div>
        {todays.length===0 ? (
          <div style={{ textAlign:"center", padding:24, color:C.muted, fontSize:15 }}>本日の予約はありません</div>
        ) : todays.map((r,i) => (
          <div key={r.id} style={{
            display:"flex", alignItems:"center", gap:12, padding:"12px 0",
            borderBottom:i<todays.length-1?`1px solid ${C.border}`:"none",
            animation:`fadeIn 0.3s ease-out ${i*0.05}s both`
          }}>
            <span style={{ color:C.accent, fontWeight:800, width:52, fontSize:18, fontFamily:"'JetBrains Mono',monospace" }}>{r.time}</span>
            <div style={{ flex:1 }}>
              <div style={{ color:C.text, fontSize:16, fontWeight:700 }}>{r.prefix}{r.name}</div>
              <div style={{ color:C.sub, fontSize:13, marginTop:2 }}>{r.menu}（{r.duration}分）</div>
            </div>
            <Badge label={statusLabel[r.status]} bg={statusBg[r.status]} />
          </div>
        ))}
      </Card>
    </div>
  );
}

/* ─── カレンダー画面 ─── */
function Calendar({reservations}) {
  const [weekOffset,setWeekOffset]=useState(0);
  const todayStr=getToday();
  const [selectedDate,setSelectedDate]=useState(todayStr);
  const baseDate=new Date();
  const weekStart=new Date(baseDate);
  weekStart.setDate(baseDate.getDate()+weekOffset*7-baseDate.getDay());
  const weekDays=Array.from({length:7},(_,i)=>{const d=new Date(weekStart);d.setDate(weekStart.getDate()+i);return d;});
  const fmt=d=>d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  const dayRes=reservations.filter(r=>r.date===selectedDate).sort((a,b)=>a.time.localeCompare(b.time));
  const selDay=weekDays.find(d=>fmt(d)===selectedDate);
  const SLOTS=Array.from({length:21},(_,i)=>{const h=Math.floor(i/2)+9;const m=i%2===0?"00":"30";return h+":"+m;});

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
        <button onClick={()=>setWeekOffset(w=>w-1)} style={{ background:C.card, border:`2px solid ${C.border}`, color:C.accent, borderRadius:10, padding:"8px 16px", cursor:"pointer", fontSize:18 }}>‹</button>
        <span style={{ color:C.text, fontSize:16, fontWeight:700 }}>{weekStart.getMonth()+1}月{weekStart.getDate()}日 〜 {weekDays[6].getMonth()+1}月{weekDays[6].getDate()}日</span>
        <button onClick={()=>setWeekOffset(w=>w+1)} style={{ background:C.card, border:`2px solid ${C.border}`, color:C.accent, borderRadius:10, padding:"8px 16px", cursor:"pointer", fontSize:18 }}>›</button>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:5, marginBottom:18 }}>
        {weekDays.map(d=>{
          const ds=fmt(d);const cnt=reservations.filter(r=>r.date===ds).length;
          const isToday=ds===todayStr;const isSel=ds===selectedDate;
          return (
            <div key={ds} onClick={()=>setSelectedDate(ds)} style={{
              background:isSel?C.accentBg:isToday?"#1e462033":C.card,
              border:`2px solid ${isSel?C.accentBorder:isToday?C.accentBorder+"88":C.border}`,
              borderRadius:10, padding:"8px 2px", textAlign:"center", cursor:"pointer"
            }}>
              <div style={{ color:isSel?"#fff":isToday?C.accent:C.muted, fontSize:12, marginBottom:2, fontWeight:600 }}>{DAYS_JP[d.getDay()]}</div>
              <div style={{ color:isSel?"#fff":C.text, fontWeight:800, fontSize:18 }}>{d.getDate()}</div>
              {cnt>0 && <div style={{ display:"flex", justifyContent:"center", gap:2, marginTop:4 }}>
                {Array.from({length:Math.min(cnt,4)},(_,i)=>(
                  <div key={i} style={{ width:5, height:5, borderRadius:"50%", background:isSel?"#fff":C.accent }} />
                ))}
              </div>}
            </div>
          );
        })}
      </div>

      <div style={{ color:C.sub, fontSize:15, marginBottom:12, fontWeight:600 }}>
        {selDay && `${selDay.getMonth()+1}月${selDay.getDate()}日（${DAYS_JP[selDay.getDay()]}）`}　{dayRes.length}件
      </div>

      {dayRes.length===0 ? (
        <Card style={{ textAlign:"center", padding:36 }}><div style={{ color:C.muted, fontSize:16 }}>予約なし</div></Card>
      ) : (
        <div style={{ position:"relative" }}>
          <div style={{ display:"flex", gap:8 }}>
            <div style={{ width:42 }}>
              {SLOTS.filter((_,i)=>i%2===0).map(s=>(
                <div key={s} style={{ height:52, display:"flex", alignItems:"flex-start", paddingTop:2 }}>
                  <span style={{ color:C.muted, fontSize:11, fontFamily:"'JetBrains Mono',monospace" }}>{s}</span>
                </div>
              ))}
            </div>
            <div style={{ flex:1, position:"relative", borderLeft:`1px solid ${C.border}` }}>
              {SLOTS.filter((_,i)=>i%2===0).map(s=>(
                <div key={s} style={{ height:52, borderBottom:`1px solid ${C.border}22` }} />
              ))}
              {dayRes.map(r=>{
                const [h,m]=r.time.split(":").map(Number);
                const startMin=(h-9)*60+m;const top=(startMin/30)*26;
                const height=Math.max((r.duration/30)*26,26);
                const c=srcColor(r.source);
                return (
                  <div key={r.id} style={{
                    position:"absolute", left:6, right:4, top, height,
                    background:c+"30", border:`1px solid ${c}88`,
                    borderRadius:8, padding:"4px 8px", overflow:"hidden"
                  }}>
                    <div style={{ color:c, fontWeight:700, fontSize:13 }}>{r.time} {r.prefix}{r.name}</div>
                    <div style={{ color:C.muted, fontSize:11 }}>{r.menu}</div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── 予約画面 ─── */
function Reservations({reservations,apiUrl,onConvert}) {
  const [filter,setFilter]=useState("all");
  const [selectedId,setSelectedId]=useState(null);
  const [converting,setConverting]=useState(null);
  const [done,setDone]=useState({});
  const [sbDone,setSbDone]=useState({});
  const [toast,setToast]=useState(null);
  const tomorrow=getTomorrow();

  const filters=[
    {key:"all",label:"全件",color:"#fff",bg:C.accentBg,borderColor:C.accentBorder},
    {key:"pending",label:"要確認",color:"#fff",bg:C.red,borderColor:"#a04040"},
    {key:"confirmed",label:"確定",color:"#fff",bg:C.blue,borderColor:"#2d7a90"},
    {key:"remind",label:"リマインド",color:"#fff",bg:"#4a2d6e",borderColor:"#6a4d8e"},
  ];

  const filtered=(()=>{
    let list=reservations;
    if(filter==="pending") list=reservations.filter(r=>r.status==="pending"||r.prefix==="【要予約】");
    else if(filter==="confirmed") list=reservations.filter(r=>r.status==="confirmed");
    else if(filter==="remind") list=reservations.filter(r=>r.date===tomorrow&&r.prefix==="【U】");
    return list.sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  })();

  const pendingCount=reservations.filter(r=>r.prefix==="【要予約】"&&!done[r.id]).length;

  const convertToU=async(id)=>{
    setConverting(id);
    const isReal=apiUrl&&!apiUrl.includes("YOUR_DEPLOYMENT_ID");
    if(isReal){
      try{ await fetch(apiUrl+"?action=convertToU&eventId="+encodeURIComponent(id)); }
      catch(e){console.error(e);}
    }
    setDone(d=>({...d,[id]:true}));
    onConvert(id,{prefix:"【U】",status:"confirmed",source:"優先"});
    setConverting(null);setSelectedId(null);
    showToast("✅ 優先予約【U】に変換しました！");
  };

  const handleSheetClose=(id,didSB)=>{
    if(didSB){
      setSbDone(prev=>({...prev,[id]:true}));
      showToast("✅ SalonBoard連携完了！U変換ボタンが有効になりました");
    }
    setSelectedId(null);
  };

  const showToast=(msg)=>{
    setToast(msg);
    setTimeout(()=>setToast(null),2500);
  };

  const selectedRes=selectedId?reservations.find(r=>r.id===selectedId):null;
  const showSheet=selectedRes&&selectedRes.prefix==="【要予約】"&&!done[selectedRes.id];

  return (
    <div>
      <h2 style={{ color:C.text, marginBottom:14, fontSize:20, fontWeight:800 }}>予約一覧</h2>

      {pendingCount>0 && (
        <div style={{ background:"#8b3a3a33", border:"2px solid #8b3a3a", borderRadius:12, padding:"12px 16px", marginBottom:16, display:"flex", alignItems:"center", gap:10 }}>
          <span style={{ fontSize:16 }}>📝</span>
          <span style={{ color:C.orange, fontSize:15, fontWeight:700 }}>SB未書き込み：{pendingCount}件</span>
          <span style={{ color:C.muted, fontSize:13, marginLeft:"auto" }}>タップで対応</span>
        </div>
      )}

      <div style={{ display:"flex", gap:10, marginBottom:18, overflowX:"auto", paddingBottom:4 }}>
        {filters.map(f=>{
          const active=filter===f.key;
          return (
            <button key={f.key} onClick={()=>setFilter(f.key)} style={{
              padding:"10px 16px", border:`2px solid ${active?f.borderColor:C.border}`,
              background:active?f.bg:C.card, color:active?f.color:C.sub,
              borderRadius:20, fontSize:15, cursor:"pointer", fontWeight:600,
              whiteSpace:"nowrap", transition:"all 0.2s"
            }}>{f.label}</button>
          );
        })}
      </div>

      <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
        {filtered.length===0 ? (
          <Card style={{ textAlign:"center", padding:32 }}>
            <div style={{ color:C.muted, fontSize:16 }}>該当する予約はありません</div>
          </Card>
        ) : filtered.map((r,i)=>{
          const isYoyaku=r.prefix==="【要予約】";const isDone=done[r.id];const isSbReady=sbDone[r.id];
          const isBlueSource = r.source==="事前予約"||r.source==="電話"||r.source==="優先"||r.prefix==="【N】"||r.prefix==="【U】"||r.prefix==="【T】";
          const cardBg = isYoyaku&&!isDone ? "#332a24"
            : r.source==="Hotpepper" ? "#3a1a1a"
            : r.source==="LINE" ? "#1a2e1a"
            : isBlueSource ? "#1a2a3a"
            : C.card;
          const cardBorder = isYoyaku&&!isDone ? "#5a3a1a"
            : r.source==="Hotpepper" ? "#5a2a2a"
            : r.source==="LINE" ? "#2a4a2a"
            : isBlueSource ? "#2a4a5a"
            : undefined;
          return (
            <div key={r.id} style={{
              background:cardBg, borderRadius:12, padding:20,
              boxShadow:"0 2px 8px rgba(0,0,0,0.3)",
              border: cardBorder ? `1px solid ${cardBorder}` : "none",
              borderLeft:`5px solid ${isYoyaku&&!isDone?C.orange:"#4a4a4a"}`,
              animation:`fadeIn 0.3s ease-out ${i*0.03}s both`
            }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
                <div style={{ fontSize:18, color:C.text, fontWeight:700 }}>
                  🕐 {r.date?r.date.slice(5).replace("-","/"):""} {r.time}
                </div>
                <Badge label={isDone?"優先客":statusLabel[r.status]} bg={isDone?C.blue:statusBg[r.status]} />
              </div>

              <div style={{ fontSize:20, fontWeight:800, color:C.text, marginBottom:6, lineHeight:1.4 }}>
                {r.prefix&&!isDone?r.prefix:""}{r.name}{isDone?"様":""}
              </div>

              <div style={{ fontSize:16, color:C.sub, marginBottom:16, lineHeight:1.5 }}>
                {r.menu}　⏱ {r.duration}分
              </div>

              {isYoyaku && !isDone ? (
                <div style={{ display:"flex", gap:10 }}>
                  <button onClick={()=>setSelectedId(r.id)} style={{
                    flex:1, padding:16, border:`2px solid ${C.accentBorder}`,
                    background:C.accentBg, color:"#fff", borderRadius:10,
                    fontSize:17, fontWeight:700, cursor:"pointer", minHeight:54
                  }}>SB連携</button>
                  <button onClick={()=>{if(isSbReady)convertToU(r.id);}}
                    disabled={!isSbReady||converting===r.id}
                    style={{
                      flex:1, padding:16,
                      border:`2px solid ${isSbReady?"#2d7a90":"#4a4a4a"}`,
                      background:isSbReady?C.blue:"#3a3a3a",
                      color:isSbReady?"#fff":"#6a6a6a",
                      borderRadius:10, fontSize:17, fontWeight:700,
                      cursor:isSbReady?"pointer":"not-allowed",
                      minHeight:54, opacity:isSbReady?1:0.6,
                      display:"flex", alignItems:"center", justifyContent:"center", gap:6
                    }}>
                    {converting===r.id ? (
                      <><span style={{ display:"inline-block", width:16, height:16, border:"2px solid #fff", borderTopColor:"transparent", borderRadius:"50%", animation:"spin 0.8s linear infinite" }} />変換中…</>
                    ) : <>U変換 {isSbReady?"✅":"🔒"}</>}
                  </button>
                </div>
              ) : isDone ? (
                <div style={{
                  textAlign:"center", padding:14, background:"#1e3a3a",
                  borderRadius:10, fontSize:16, color:C.blueBright,
                  fontWeight:700, border:"2px solid #2d5a5a"
                }}>✓ 優先予約確定済み</div>
              ) : (
                <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
                  <Badge label={r.source} bg={srcColor(r.source)} />
                  {r.visits && <span style={{ color:C.muted, fontSize:13 }}>来店{r.visits}回</span>}
                  {r.rank && <Badge label={rankLabel[r.rank]} bg={rankColor[r.rank]+"66"} color={rankColor[r.rank]} />}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {showSheet && (
        <SalonBoardSheet
          reservation={selectedRes}
          onClose={(didSB)=>handleSheetClose(selectedRes.id,didSB)}
          converting={converting===selectedRes?.id}
        />
      )}

      {toast && (
        <div style={{
          position:"fixed", top:24, left:"50%", transform:"translateX(-50%)",
          background:C.accentBg, color:"#fff", padding:"16px 28px", borderRadius:12,
          fontSize:16, fontWeight:600, zIndex:2000,
          boxShadow:"0 4px 20px rgba(0,0,0,0.5)", border:`2px solid ${C.accentBorder}`,
          animation:"fadeToast 0.3s ease-out"
        }}>{toast}</div>
      )}
    </div>
  );
}

/* ─── 設定画面 ─── */
function Settings({apiUrl,setApiUrl,refetch}) {
  const [saved,setSaved]=useState(false);
  const [localUrl,setLocalUrl]=useState(apiUrl);
  const handleSave=()=>{
    setApiUrl(localUrl);
    localStorage.setItem("reservekit_api_url",localUrl);
    setSaved(true);
    setTimeout(()=>{setSaved(false);refetch();},500);
  };

  return (
    <div>
      <h2 style={{ color:C.text, marginBottom:16, fontSize:20, fontWeight:800 }}>設定</h2>
      <Card style={{ marginBottom:16 }}>
        <div style={{ color:C.accent, fontSize:16, fontWeight:700, marginBottom:14 }}>🔌 GAS API接続</div>
        <div style={{ marginBottom:14 }}>
          <div style={{ color:C.sub, fontSize:13, marginBottom:6 }}>GAS デプロイURL</div>
          <input value={localUrl} onChange={e=>setLocalUrl(e.target.value)}
            placeholder="https://script.google.com/macros/s/.../exec"
            style={{
              width:"100%", background:C.surface, border:`2px solid ${C.border}`,
              borderRadius:10, padding:"12px 14px", color:C.text, fontSize:13,
              boxSizing:"border-box", fontFamily:"'JetBrains Mono',monospace"
            }}
          />
        </div>
      </Card>
      <Card style={{ marginBottom:16 }}>
        <div style={{ color:C.accent, fontSize:16, fontWeight:700, marginBottom:14 }}>🎖 ランク設定</div>
        {[["STANDARD","1〜15回"],["SILVER","16〜30回"],["GOLD","31回以上"]].map(([r,range])=>(
          <div key={r} style={{
            display:"flex", justifyContent:"space-between", alignItems:"center",
            padding:"12px 0", borderBottom:`1px solid ${C.border}`
          }}>
            <Badge label={r} bg={rankColor[r.toLowerCase()]+"66"} color={rankColor[r.toLowerCase()]} />
            <span style={{ color:C.sub, fontSize:15 }}>{range}</span>
          </div>
        ))}
      </Card>
      <button onClick={handleSave} style={{
        width:"100%", background:saved?C.green:C.accentBg, color:"#fff",
        border:`2px solid ${saved?C.green:C.accentBorder}`,
        borderRadius:12, padding:"16px", fontSize:17,
        fontWeight:700, cursor:"pointer", minHeight:54
      }}>{saved?"✓ 保存 → 再取得中…":"設定を保存 & 再取得"}</button>
    </div>
  );
}

/* ─── メインApp（4タブ） ─── */
function App() {
  const savedUrl=localStorage.getItem("reservekit_api_url")||GAS_API_DEFAULT;
  const [tab,setTab]=useState("dashboard");
  const [apiUrl,setApiUrl]=useState(savedUrl);
  const {data,homeStats,loading,error,refetch,isReal,lastFetched,updateLocal}=useReservations(apiUrl);

  const tabs=[
    {key:"dashboard",label:"ホーム"},
    {key:"calendar", label:"カレンダー"},
    {key:"reservations",label:"予約"},
    {key:"settings", label:"設定"},
  ];
  const pendingCount=data.filter(r=>r.prefix==="【要予約】").length;

  return (
    <div style={{
      background:C.bg, minHeight:"100vh", color:C.text,
      fontFamily:"'Noto Sans JP',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",
      display:"flex", flexDirection:"column", maxWidth:480, margin:"0 auto"
    }}>
      {/* ヘッダー */}
      <div style={{
        background:`linear-gradient(135deg, ${C.accentBg} 0%, #0f2b12 100%)`,
        padding:"20px 24px", textAlign:"center",
        position:"sticky", top:0, zIndex:10
      }}>
        <div style={{ color:"#fff", fontWeight:800, fontSize:24, letterSpacing:1, marginBottom:4 }}>📱 ReserveKit</div>
        <div style={{ color:"rgba(255,255,255,0.8)", fontSize:14 }}>Enchante Hair</div>
        {loading && <div style={{ color:"rgba(255,255,255,0.5)", fontSize:12, marginTop:4, animation:"pulse 1.5s infinite" }}>同期中…</div>}
      </div>

      {/* タブバー（上部） */}
      <div style={{
        display:"flex", background:"#252525",
        borderBottom:`2px solid ${C.border}`, position:"sticky", top:76, zIndex:10
      }}>
        {tabs.map(t=>(
          <button key={t.key} onClick={()=>setTab(t.key)} style={{
            flex:1, padding:"16px 0", background:tab===t.key?"#2a2a2a":"transparent",
            border:"none", borderBottom:`3px solid ${tab===t.key?C.accentBg:"transparent"}`,
            color:tab===t.key?C.accent:C.muted,
            fontSize:15, fontWeight:600, cursor:"pointer",
            transition:"all 0.2s", position:"relative"
          }}>
            {t.label}
            {t.key==="reservations"&&pendingCount>0 && (
              <span style={{
                position:"absolute", top:6, right:"10%",
                background:C.orange, color:"#000",
                fontSize:10, fontWeight:800, borderRadius:8,
                padding:"1px 6px", minWidth:14, textAlign:"center"
              }}>{pendingCount}</span>
            )}
          </button>
        ))}
      </div>

      {/* コンテンツ */}
      <div style={{ flex:1, padding:"18px", overflowY:"auto" }}>
        {tab==="dashboard" && <Dashboard reservations={data} homeStats={homeStats} loading={loading} error={error} refetch={refetch} isReal={isReal} lastFetched={lastFetched} />}
        {tab==="calendar" && <Calendar reservations={data} />}
        {tab==="reservations" && <Reservations reservations={data} apiUrl={apiUrl} onConvert={updateLocal} />}
        {tab==="settings" && <Settings apiUrl={apiUrl} setApiUrl={setApiUrl} refetch={refetch} />}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
